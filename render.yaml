services:
  - type: web
    name: planillas-api
    env: docker
    repo: https://github.com/Pierreyfff/ugelaa
    branch: ULTIMOO
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://ugelaa.vercel.app,http://localhost:5173
      - key: PORT
        value: "8080"
    healthCheckPath: /health
