services:
  - type: web
    name: planillas-backend
    env: docker
    repo: https://github.com/Pierreyfff/ugelaa
    branch: main
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: planillas-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://planillas-frontend.vercel.app,http://localhost:5173
      - key: PORT
        value: "8080"
    healthCheckPath: /health

  - type: web
    name: planillas-python
    env: docker
    repo: https://github.com/Pierreyfff/ugelaa
    branch: main
    dockerfilePath: ./python-excel/Dockerfile
    envVars:
      - key: BACKEND_URL
        value: https://planillas-backend.onrender.com
      - key: PORT
        value: "8081"
    healthCheckPath: /health

databases:
  - name: planillas-db
    databaseName: planillas
    plan: free
    postgresMajorVersion: 16
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
