
services:
  postgres:
    image: postgres:18-alpine
    container_name: planillas-postgres
    environment:
      POSTGRES_USER: planillas
      POSTGRES_PASSWORD: planillas2024
      POSTGRES_DB: planillas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planillas"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: planillas-backend
    environment:
      - DATABASE_URL=postgres://planillas:planillas2024@postgres:5432/planillas?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  python-excel:
    build:
      context: ./python-excel
      dockerfile: Dockerfile
    container_name: planillas-python
    volumes:
      - ./uploads:/app/uploads
      - ./python-excel:/app
    ports:
      - "8081:8081"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: planillas-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
      - python-excel
    restart: unless-stopped

volumes:
  postgres_data: